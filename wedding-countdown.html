<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wedding Countdown</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #fdf8f0;
      --gold: #c9a84c;
      --gold-light: #e8d49a;
      --gold-pale: #f5ead0;
      --rose: #c4707e;
      --rose-pale: #f9eaec;
      --brown: #5c3d2e;
      --text: #3a2a1e;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      position: relative;
    }

    /* Petal rain */
    .petals { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .petal {
      position: absolute;
      top: -60px;
      width: 14px; height: 18px;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg) scale(1);    opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(720deg) scale(0.6); opacity: 0; }
    }

    /* Decorative background rings */
    .ring {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.15);
      pointer-events: none;
      z-index: 0;
    }
    .ring-1 { width: 500px; height: 500px; top: -200px; left: -180px; }
    .ring-2 { width: 700px; height: 700px; bottom: -300px; right: -280px; border-color: rgba(196,112,126,0.12); }
    .ring-3 { width: 300px; height: 300px; bottom: 80px; left: -100px; border-color: rgba(201,168,76,0.1); }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 4px;
      padding: 60px 70px 56px;
      max-width: 700px;
      width: 92vw;
      text-align: center;
      box-shadow:
        0 4px 40px rgba(92,61,46,0.08),
        0 1px 2px rgba(201,168,76,0.2),
        inset 0 0 60px rgba(245,234,208,0.3);
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner ornaments */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 40px; height: 40px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.6;
    }
    .card::before { top: 14px; left: 14px; border-width: 1px 0 0 1px; }
    .card::after  { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; }

    /* Inner corner ornaments via wrapper */
    .ornament-tr, .ornament-bl {
      position: absolute;
      width: 40px; height: 40px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.6;
    }
    .ornament-tr { top: 14px; right: 14px; border-width: 1px 1px 0 0; }
    .ornament-bl { bottom: 14px; left: 14px; border-width: 0 0 1px 1px; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      opacity: 0.6;
    }
    .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
    .divider-diamond {
      width: 6px; height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* Eyebrow */
    .eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 10px;
      animation: fadeUp 1.2s 0.2s both;
    }

    /* Names */
    .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(38px, 7vw, 62px);
      font-weight: 300;
      font-style: italic;
      color: var(--text);
      line-height: 1.1;
      letter-spacing: 0.5px;
      animation: fadeUp 1.2s 0.3s both;
    }
    .names .ampersand {
      font-size: 1.3em;
      color: var(--rose);
      display: inline-block;
      margin: 0 8px;
      font-style: normal;
    }

    /* Date line */
    .wedding-date {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 2.5px;
      color: var(--brown);
      opacity: 0.7;
      margin-top: 6px;
      animation: fadeUp 1.2s 0.4s both;
    }

    /* Timer blocks */
    .timer {
      display: flex;
      justify-content: center;
      gap: clamp(10px, 3vw, 28px);
      margin: 32px 0 28px;
      animation: fadeUp 1.2s 0.5s both;
    }
    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .unit-value {
      font-family: 'Cinzel', serif;
      font-size: clamp(34px, 6vw, 58px);
      font-weight: 600;
      color: var(--text);
      line-height: 1;
      min-width: clamp(60px, 9vw, 88px);
      background: linear-gradient(160deg, var(--gold-pale) 0%, #fff 60%, var(--gold-pale) 100%);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 3px;
      padding: 14px 8px 10px;
      box-shadow: 0 2px 12px rgba(201,168,76,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
      transition: transform 0.12s ease;
      position: relative;
      overflow: hidden;
    }
    .unit-value::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 1px;
      background: rgba(201,168,76,0.2);
    }
    .unit-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 300;
    }

    .separator {
      align-self: center;
      padding-bottom: 20px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      color: var(--gold);
      opacity: 0.5;
      font-weight: 300;
      line-height: 1;
    }

    /* Flip animation */
    .flip { animation: flipNum 0.35s ease; }
    @keyframes flipNum {
      0%   { transform: rotateX(0deg); opacity: 1; }
      50%  { transform: rotateX(-90deg); opacity: 0; }
      100% { transform: rotateX(0deg); opacity: 1; }
    }

    /* Footer line */
    .footer-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 16px;
      color: var(--brown);
      opacity: 0.65;
      letter-spacing: 0.5px;
      animation: fadeUp 1.2s 0.7s both;
    }

    /* Confetti on completion */
    .celebration { display: none; }
    .done .celebration { display: block; }
    .done .timer { display: none; }
    .done .footer-text { display: none; }
    .celebration-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(22px, 4vw, 34px);
      font-style: italic;
      color: var(--rose);
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <!-- Background petals -->
  <div class="petals" id="petals"></div>

  <!-- Decorative rings -->
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <div class="card" id="card">
    <div class="ornament-tr"></div>
    <div class="ornament-bl"></div>

    <p class="eyebrow">Counting Down To Forever</p>

    <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>

    <div class="names">
      <span style="display:block;">Nayana</span>
      <span class="ampersand" style="display:block; font-size:0.7em; margin: 4px 0;">&</span>
      <span style="display:block;">Naga Phaneendra</span>
    </div>

    <p class="wedding-date">13 · May · 2026 &nbsp;|&nbsp; <span style="white-space:nowrap;">9:40 AM</span></p>

    <div class="divider" style="margin-top:18px;"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>

    <div class="timer">
      <div class="unit">
        <div class="unit-value" id="days">00</div>
        <div class="unit-label">Days</div>
      </div>
      <div class="separator">·</div>
      <div class="unit">
        <div class="unit-value" id="hours">00</div>
        <div class="unit-label">Hours</div>
      </div>
      <div class="separator">·</div>
      <div class="unit">
        <div class="unit-value" id="minutes">00</div>
        <div class="unit-label">Minutes</div>
      </div>
      <div class="separator">·</div>
      <div class="unit">
        <div class="unit-value" id="seconds">00</div>
        <div class="unit-label">Seconds</div>
      </div>
    </div>

    <div class="celebration">
      <p class="celebration-text">🎊 Today is the Day! Congratulations! 🎊</p>
    </div>

    <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>

    <p class="footer-text">"Two souls, one heart, one lifetime."</p>
  </div>

  <script>
    // ── Petals ──────────────────────────────────────────────
    const petalColors = ['#f4a7b2','#f9c4cd','#e8aebc','#f7d6da','#fce4e8','#f2bac4'];
    const container = document.getElementById('petals');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      const size = 10 + Math.random() * 10;
      p.style.cssText = `
        left: ${Math.random()*100}%;
        width: ${size}px; height: ${size*1.3}px;
        background: ${petalColors[Math.floor(Math.random()*petalColors.length)]};
        animation-duration: ${6 + Math.random()*8}s;
        animation-delay: ${Math.random()*10}s;
        opacity: 0;
        border-radius: ${Math.random()>0.5 ? '50% 0 50% 0' : '0 50% 0 50%'};
        transform: rotate(${Math.random()*360}deg);
      `;
      container.appendChild(p);
    }

    // ── Countdown ───────────────────────────────────────────
    const target = new Date('2026-05-13T09:40:00');

    const dEl = document.getElementById('days');
    const hEl = document.getElementById('hours');
    const mEl = document.getElementById('minutes');
    const sEl = document.getElementById('seconds');
    const card = document.getElementById('card');

    function pad(n) { return String(n).padStart(2, '0'); }

    function animate(el, val) {
      const str = pad(val);
      if (el.textContent !== str) {
        el.classList.remove('flip');
        void el.offsetWidth; // reflow
        el.classList.add('flip');
        el.textContent = str;
      }
    }

    function tick() {
      const now  = new Date();
      const diff = target - now;

      if (diff <= 0) {
        card.classList.add('done');
        return;
      }

      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000)  / 60000);
      const s = Math.floor((diff % 60000)    / 1000);

      animate(dEl, d);
      animate(hEl, h);
      animate(mEl, m);
      animate(sEl, s);
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
